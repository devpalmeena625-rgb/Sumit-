<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💀 Real Aadhar + QR Scanner 💀</title>
    <!-- QR Code Generator Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <!-- QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Arial,sans-serif; }
        body { background:#0a0a0a; color:#fff; padding:20px; display:flex; flex-direction:column; align-items:center; }
        h1 { color:#ff3333; text-shadow:0 0 20px #ff333388; margin-bottom:5px; }
        .sub { color:#999; margin-bottom:20px; }
        .tabs { display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; justify-content:center; }
        .tab-btn { padding:12px 30px; background:#2a2a2a; border:2px solid #444; border-radius:30px; color:#fff; font-weight:bold; font-size:16px; cursor:pointer; transition:0.2s; }
        .tab-btn.active { background:#e53935; border-color:#e53935; box-shadow:0 0 20px #e5393588; }
        .tab-btn:hover { background:#444; }
        .tab-content { display:none; width:100%; max-width:1300px; }
        .tab-content.active { display:flex; flex-wrap:wrap; gap:30px; justify-content:center; }
        .form-box { background:#1a1a1a; padding:25px; border-radius:12px; box-shadow:0 0 30px #000000aa; flex:1 1 400px; }
        .form-box label { display:block; margin:12px 0 4px; font-weight:bold; color:#ccc; }
        .form-box input, .form-box textarea { width:100%; padding:8px 12px; border:none; border-radius:6px; background:#2a2a2a; color:#fff; font-size:14px; }
        .form-box textarea { resize:vertical; height:60px; }
        .form-box input[type="file"] { background:transparent; padding:8px 0; }
        .form-box button { margin-top:20px; padding:12px 30px; background:#e53935; border:none; border-radius:30px; color:#fff; font-weight:bold; font-size:18px; cursor:pointer; width:100%; transition:0.2s; }
        .form-box button:hover { background:#ff5252; box-shadow:0 0 20px #e5393588; }
        .cards-box { flex:1 1 600px; display:flex; flex-direction:column; gap:20px; align-items:center; }
        .card-pair { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
        .card-wrapper { background:#1a1a1a; padding:15px; border-radius:12px; box-shadow:0 0 20px #00000088; display:flex; flex-direction:column; align-items:center; }
        .card-wrapper h3 { color:#ff4444; margin-bottom:10px; }
        canvas { border-radius:8px; box-shadow:0 0 20px #000000aa; max-width:100%; height:auto; background:#fff; }
        .download-btn { margin-top:10px; padding:10px 25px; background:#43a047; border:none; border-radius:30px; color:#fff; font-weight:bold; font-size:16px; cursor:pointer; transition:0.2s; }
        .download-btn:hover { background:#66bb6a; box-shadow:0 0 20px #43a04788; }
        .scanner-box { background:#1a1a1a; padding:25px; border-radius:12px; box-shadow:0 0 30px #000000aa; max-width:600px; width:100%; text-align:center; }
        #reader { width:100%; max-width:500px; margin:0 auto; border-radius:12px; overflow:hidden; }
        #reader video { border-radius:12px; }
        .scanner-result { margin-top:20px; background:#2a2a2a; padding:15px; border-radius:8px; }
        .scanner-result p { color:#4caf50; font-size:18px; word-break:break-all; }
        .scanner-result .label { color:#888; font-size:14px; }
        .footer { margin-top:30px; color:#666; font-size:14px; }
        #startScannerBtn { background:#ff9800; }
        #startScannerBtn:hover { background:#ffb74d; }
        #qrTemp { display:none; } /* hidden div for QR generation */
    </style>
</head>
<body>
    <h1>💀 DEVILS WILL RISE – REAL AADHAR + QR 💀</h1>
    <p class="sub">@SGCodexs | @FfbotAll – Real QR, Real Scan</p>

    <div class="tabs">
        <button class="tab-btn active" data-tab="generator">📇 Generator</button>
        <button class="tab-btn" data-tab="scanner">📷 QR Scanner</button>
    </div>

    <!-- Tab: Generator -->
    <div id="generator" class="tab-content active">
        <div class="form-box">
            <h3 style="color:#e53935;">📝 Fill Details</h3>
            <label>Photo (upload image)</label>
            <input type="file" id="photoInput" accept="image/*">
            <label>Full Name</label>
            <input type="text" id="nameInput" placeholder="e.g. RAHUL KUMAR" value="RAHUL KUMAR">
            <label>Date of Birth (DD/MM/YYYY)</label>
            <input type="text" id="dobInput" placeholder="01/01/1990" value="01/01/1990">
            <label>Gender</label>
            <input type="text" id="genderInput" placeholder="MALE / FEMALE" value="MALE">
            <label>Aadhar Number (12 digits)</label>
            <input type="text" id="aadharInput" placeholder="1234 5678 9012" value="1234 5678 9012">
            <label>Address</label>
            <textarea id="addressInput" placeholder="House, Street, City, State - PIN">123, Gandhi Nagar, Delhi - 110001</textarea>
            <label>Issue Date (DD/MM/YYYY)</label>
            <input type="text" id="issueDateInput" placeholder="01/01/2020" value="01/01/2020">
            <label>Registration Number</label>
            <input type="text" id="regNoInput" placeholder="e.g. 1234/56789/12345" value="1234/56789/12345">
            <button id="generateBtn">🔥 Generate Both Sides 🔥</button>
        </div>
        <div class="cards-box">
            <div class="card-pair">
                <div class="card-wrapper">
                    <h3>🔹 Front Side</h3>
                    <canvas id="frontCanvas" width="550" height="380"></canvas>
                    <button class="download-btn" id="downloadFront">⬇️ Download Front</button>
                </div>
                <div class="card-wrapper">
                    <h3>🔹 Back Side (with Real QR)</h3>
                    <canvas id="backCanvas" width="550" height="380"></canvas>
                    <button class="download-btn" id="downloadBack">⬇️ Download Back</button>
                </div>
            </div>
            <button class="download-btn" id="downloadBoth" style="background:#ff9800; width:200px;">⬇️ Download Both (Combined)</button>
        </div>
    </div>

    <!-- Tab: Scanner -->
    <div id="scanner" class="tab-content">
        <div class="scanner-box">
            <h3 style="color:#ff9800;">📷 Scan QR Code</h3>
            <p style="color:#999; margin-bottom:15px;">Camera access de – generated QR ya real QR scan kar</p>
            <div id="reader"></div>
            <button id="startScannerBtn" style="margin-top:15px; padding:12px 30px; background:#ff9800; border:none; border-radius:30px; color:#fff; font-weight:bold; font-size:18px; cursor:pointer;">📸 Start Scanner</button>
            <div class="scanner-result" id="scannerResult">
                <span class="label">Scanned Data:</span>
                <p id="scannedData">—</p>
            </div>
        </div>
    </div>

    <div class="footer">💀 DEVILS WILL RISE – Real Code, Real Card, Real QR 💀</div>

    <!-- Hidden div for QR generation -->
    <div id="qrTemp"></div>

    <script>
        // ========== AADHAR GENERATOR ==========
        (function() {
            const frontCanvas = document.getElementById('frontCanvas');
            const fCtx = frontCanvas.getContext('2d');
            const backCanvas = document.getElementById('backCanvas');
            const bCtx = backCanvas.getContext('2d');
            let userPhoto = null;

            const nameInput = document.getElementById('nameInput');
            const dobInput = document.getElementById('dobInput');
            const genderInput = document.getElementById('genderInput');
            const aadharInput = document.getElementById('aadharInput');
            const addressInput = document.getElementById('addressInput');
            const issueDateInput = document.getElementById('issueDateInput');
            const regNoInput = document.getElementById('regNoInput');
            const photoInput = document.getElementById('photoInput');
            const generateBtn = document.getElementById('generateBtn');

            // Function to generate real QR code and return canvas element
            function generateQRCanvas(data, size) {
                const container = document.getElementById('qrTemp');
                container.innerHTML = ''; // clear previous
                const qr = new QRCode(container, {
                    text: data,
                    width: size,
                    height: size,
                    colorDark: "#1a237e",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
                // Get the canvas element created by QRCode library (it creates a canvas or img)
                const qrCanvas = container.querySelector('canvas');
                if (qrCanvas) {
                    return qrCanvas;
                } else {
                    // fallback: if img, draw img to canvas
                    const img = container.querySelector('img');
                    if (img) {
                        const c = document.createElement('canvas');
                        c.width = size;
                        c.height = size;
                        const ctx = c.getContext('2d');
                        ctx.drawImage(img, 0, 0, size, size);
                        return c;
                    }
                }
                return null;
            }

            function drawFront(photo) {
                const w = 550, h = 380;
                fCtx.clearRect(0, 0, w, h);
                let grad = fCtx.createLinearGradient(0,0,w,0);
                grad.addColorStop(0, '#f5f5f5');
                grad.addColorStop(1, '#ffffff');
                fCtx.fillStyle = grad;
                fCtx.fillRect(0,0,w,h);
                fCtx.strokeStyle = '#1a237e';
                fCtx.lineWidth = 6;
                fCtx.strokeRect(4,4,w-8,h-8);
                fCtx.strokeStyle = '#283593';
                fCtx.lineWidth = 2;
                fCtx.strokeRect(10,10,w-20,h-20);
                fCtx.fillStyle = '#e8eaf6';
                fCtx.fillRect(12,12,w-24,50);
                fCtx.fillStyle = '#1a237e';
                fCtx.font = 'bold 22px "Segoe UI", Arial, sans-serif';
                fCtx.textAlign = 'center';
                fCtx.fillText('भारत सरकार', w/2, 38);
                fCtx.fillStyle = '#0d47a1';
                fCtx.font = '14px Arial';
                fCtx.fillText('GOVERNMENT OF INDIA', w/2, 58);
                fCtx.font = 'bold 18px Arial';
                fCtx.fillStyle = '#0d47a1';
                fCtx.fillText('🔹 आधार 🔹', w/2, 80);
                fCtx.strokeStyle = '#1a237e';
                fCtx.lineWidth = 1;
                fCtx.beginPath();
                fCtx.moveTo(20,85);
                fCtx.lineTo(w-20,85);
                fCtx.stroke();

                const photoX = 45, photoY = 110, photoSize = 85;
                fCtx.save();
                fCtx.beginPath();
                fCtx.arc(photoX + photoSize/2, photoY + photoSize/2, photoSize/2, 0, Math.PI*2);
                fCtx.closePath();
                fCtx.clip();
                if (photo && photo.complete && photo.naturalWidth > 0) {
                    fCtx.drawImage(photo, photoX, photoY, photoSize, photoSize);
                } else {
                    fCtx.fillStyle = '#cfd8dc';
                    fCtx.fillRect(photoX, photoY, photoSize, photoSize);
                    fCtx.fillStyle = '#78909c';
                    fCtx.font = '14px Arial';
                    fCtx.textAlign = 'center';
                    fCtx.fillText('📷', photoX + photoSize/2, photoY + photoSize/2 + 5);
                }
                fCtx.restore();
                fCtx.strokeStyle = '#1a237e';
                fCtx.lineWidth = 3;
                fCtx.beginPath();
                fCtx.arc(photoX + photoSize/2, photoY + photoSize/2, photoSize/2, 0, Math.PI*2);
                fCtx.stroke();

                const startX = 165;
                let yPos = 110;
                fCtx.textAlign = 'left';
                fCtx.fillStyle = '#000';
                fCtx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                fCtx.fillStyle = '#37474f';
                fCtx.fillText('नाम / Name', startX, yPos);
                yPos += 22;
                fCtx.font = 'bold 20px "Segoe UI", Arial, sans-serif';
                fCtx.fillStyle = '#212121';
                const name = nameInput.value.trim().toUpperCase() || 'RAHUL KUMAR';
                fCtx.fillText(name, startX, yPos);
                yPos += 32;
                fCtx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                fCtx.fillStyle = '#37474f';
                fCtx.fillText('जन्म तिथि / DOB', startX, yPos);
                yPos += 20;
                fCtx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
                fCtx.fillStyle = '#212121';
                const dob = dobInput.value.trim() || '01/01/1990';
                fCtx.fillText(dob, startX, yPos);
                yPos += 28;
                fCtx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                fCtx.fillStyle = '#37474f';
                fCtx.fillText('लिंग / Gender', startX, yPos);
                yPos += 20;
                fCtx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
                fCtx.fillStyle = '#212121';
                const gender = genderInput.value.trim().toUpperCase() || 'MALE';
                fCtx.fillText(gender, startX, yPos);
                yPos += 28;
                fCtx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                fCtx.fillStyle = '#0d47a1';
                fCtx.fillText('आधार संख्या / Aadhar Number', startX, yPos);
                yPos += 24;
                fCtx.font = 'bold 24px "Courier New", monospace';
                fCtx.fillStyle = '#0d47a1';
                let aadhar = aadharInput.value.trim().replace(/\D/g, '').slice(0,12);
                if (aadhar.length === 12) {
                    aadhar = aadhar.slice(0,4) + ' ' + aadhar.slice(4,8) + ' ' + aadhar.slice(8,12);
                } else {
                    aadhar = '1234 5678 9012';
                }
                fCtx.fillText(aadhar, startX, yPos);
                yPos += 32;
                fCtx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                fCtx.fillStyle = '#37474f';
                fCtx.fillText('पता / Address', startX, yPos);
                yPos += 20;
                fCtx.font = '13px "Segoe UI", Arial, sans-serif';
                fCtx.fillStyle = '#212121';
                const addr = addressInput.value.trim() || '123, Gandhi Nagar, Delhi - 110001';
                const lines = addr.split(',').map(s => s.trim());
                for (let line of lines) {
                    if (line) {
                        fCtx.fillText(line, startX, yPos);
                        yPos += 18;
                    }
                }
                fCtx.fillStyle = '#78909c';
                fCtx.font = '10px Arial';
                fCtx.textAlign = 'left';
                fCtx.fillText('www.uidai.gov.in', 20, h-15);
                fCtx.textAlign = 'right';
                fCtx.fillStyle = '#0d47a1';
                fCtx.font = 'bold 12px Arial';
                fCtx.fillText('🔹 आधार 🔹', w-20, h-15);
            }

            function drawBack() {
                const w = 550, h = 380;
                bCtx.clearRect(0, 0, w, h);
                bCtx.fillStyle = '#fafafa';
                bCtx.fillRect(0,0,w,h);
                bCtx.strokeStyle = '#1a237e';
                bCtx.lineWidth = 6;
                bCtx.strokeRect(4,4,w-8,h-8);
                bCtx.strokeStyle = '#283593';
                bCtx.lineWidth = 2;
                bCtx.strokeRect(10,10,w-20,h-20);
                bCtx.fillStyle = '#1a237e';
                bCtx.font = 'bold 16px "Segoe UI", Arial, sans-serif';
                bCtx.textAlign = 'center';
                bCtx.fillText('🔹 आधार - BACK SIDE 🔹', w/2, 35);

                // ---------- Generate REAL QR Code ----------
                // Build data for QR: encode all details as JSON
                const name = nameInput.value.trim() || 'RAHUL KUMAR';
                const dob = dobInput.value.trim() || '01/01/1990';
                const gender = genderInput.value.trim().toUpperCase() || 'MALE';
                let aadharNum = aadharInput.value.trim().replace(/\D/g, '').slice(0,12);
                if (aadharNum.length < 12) aadharNum = '123456789012';
                const address = addressInput.value.trim() || '123, Gandhi Nagar, Delhi - 110001';
                const issueDate = issueDateInput.value.trim() || '01/01/2020';
                const regNo = regNoInput.value.trim() || '1234/56789/12345';

                const qrData = JSON.stringify({
                    name: name,
                    dob: dob,
                    gender: gender,
                    aadhar: aadharNum,
                    address: address,
                    issueDate: issueDate,
                    regNo: regNo
                });

                // Generate QR code canvas (size 160x160)
                const qrCanvas = generateQRCanvas(qrData, 160);
                if (qrCanvas) {
                    // Position QR at (70, 70) with size 160x160
                    bCtx.drawImage(qrCanvas, 70, 70, 160, 160);
                } else {
                    // Fallback if QR generation failed
                    bCtx.fillStyle = '#e0e0e0';
                    bCtx.fillRect(70,70,160,160);
                    bCtx.fillStyle = '#000';
                    bCtx.font = '14px Arial';
                    bCtx.textAlign = 'center';
                    bCtx.fillText('QR Error', 150, 150);
                }

                // Details on right side of back
                const startX = 260;
                let yPos = 70;
                bCtx.textAlign = 'left';
                bCtx.fillStyle = '#000';
                bCtx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                bCtx.fillStyle = '#37474f';
                bCtx.fillText('Issue Date', startX, yPos);
                yPos += 22;
                bCtx.font = '16px "Segoe UI", Arial, sans-serif';
                bCtx.fillStyle = '#212121';
                bCtx.fillText(issueDate, startX, yPos);
                yPos += 32;
                bCtx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                bCtx.fillStyle = '#37474f';
                bCtx.fillText('Registration No.', startX, yPos);
                yPos += 22;
                bCtx.font = '16px "Segoe UI", Arial, sans-serif';
                bCtx.fillStyle = '#212121';
                bCtx.fillText(regNo, startX, yPos);
                yPos += 32;
                bCtx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                bCtx.fillStyle = '#37474f';
                bCtx.fillText('UIDAI Helpline', startX, yPos);
                yPos += 22;
                bCtx.font = '16px "Segoe UI", Arial, sans-serif';
                bCtx.fillStyle = '#212121';
                bCtx.fillText('1947', startX, yPos);
                yPos += 32;
                bCtx.font = 'bold 14px "Segoe UI", Arial, sans-serif';
                bCtx.fillStyle = '#37474f';
                bCtx.fillText('Email Support', startX, yPos);
                yPos += 22;
                bCtx.font = '14px "Segoe UI", Arial, sans-serif';
                bCtx.fillStyle = '#212121';
                bCtx.fillText('help@uidai.gov.in', startX, yPos);
                yPos += 32;

                // Hologram strip
                bCtx.fillStyle = '#e0e0e0';
                bCtx.fillRect(20, h-50, w-40, 30);
                bCtx.fillStyle = '#1a237e';
                bCtx.font = 'bold 12px Arial';
                bCtx.textAlign = 'center';
                bCtx.fillText('🔹 आधार 🔹  |  भारत सरकार  |  www.uidai.gov.in', w/2, h-30);
                bCtx.fillStyle = '#999';
                bCtx.font = '8px Arial';
                bCtx.textAlign = 'center';
                bCtx.fillText('This is a demonstration card. Not for official use.', w/2, h-8);
            }

            function generateBoth() {
                drawFront(userPhoto);
                drawBack();
            }

            photoInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        const img = new Image();
                        img.onload = function() {
                            userPhoto = img;
                            generateBoth();
                        };
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            generateBtn.addEventListener('click', generateBoth);

            document.getElementById('downloadFront').addEventListener('click', function() {
                const link = document.createElement('a');
                link.download = 'aadhar_front.png';
                link.href = frontCanvas.toDataURL('image/png');
                link.click();
            });

            document.getElementById('downloadBack').addEventListener('click', function() {
                const link = document.createElement('a');
                link.download = 'aadhar_back.png';
                link.href = backCanvas.toDataURL('image/png');
                link.click();
            });

            document.getElementById('downloadBoth').addEventListener('click', function() {
                const combined = document.createElement('canvas');
                combined.width = 550;
                combined.height = 760;
                const ctx = combined.getContext('2d');
                ctx.fillStyle = '#fff';
                ctx.fillRect(0,0,550,760);
                ctx.drawImage(frontCanvas, 0, 0);
                ctx.drawImage(backCanvas, 0, 390);
                const link = document.createElement('a');
                link.download = 'aadhar_both.png';
                link.href = combined.toDataURL('image/png');
                link.click();
            });

            window.onload = function() {
                generateBoth();
            };
        })();

        // ========== QR SCANNER ==========
        (function() {
            let html5QrCode = null;
            let isScanning = false;
            const readerDiv = document.getElementById('reader');
            const scannedData = document.getElementById('scannedData');
            const startBtn = document.getElementById('startScannerBtn');

            startBtn.addEventListener('click', function() {
                if (isScanning) {
                    stopScanner();
                    return;
                }
                startScanner();
            });

            function startScanner() {
                if (typeof Html5Qrcode === 'undefined') {
                    scannedData.textContent = '❌ Library load nahi hui. Internet check kar.';
                    return;
                }
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    scannedData.textContent = '❌ Camera support nahi hai is browser mein.';
                    return;
                }
                html5QrCode = new Html5Qrcode("reader");
                const config = { fps: 15, qrbox: { width: 250, height: 250 } };
                html5QrCode.start(
                    { facingMode: "environment" },
                    config,
                    onScanSuccess,
                    onScanError
                ).then(() => {
                    isScanning = true;
                    startBtn.textContent = '🛑 Stop Scanner';
                    startBtn.style.background = '#e53935';
                    scannedData.textContent = '🔍 Scanning...';
                }).catch(err => {
                    scannedData.textContent = '❌ Camera error: ' + err;
                });
            }

            function stopScanner() {
                if (html5QrCode) {
                    html5QrCode.stop().then(() => {
                        isScanning = false;
                        startBtn.textContent = '📸 Start Scanner';
                        startBtn.style.background = '#ff9800';
                        scannedData.textContent = '—';
                    }).catch(() => {});
                }
            }

            function onScanSuccess(decodedText, decodedResult) {
                scannedData.textContent = decodedText;
                // Optionally stop after first scan
                // stopScanner();
            }

            function onScanError(err) {
                // ignore
            }

            // Cleanup on tab switch
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (this.dataset.tab !== 'scanner' && isScanning) {
                        stopScanner();
                    }
                });
            });
        })();

        // ========== TABS ==========
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                const tabId = this.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
            });
        });
    </script>
</body>
</html>
